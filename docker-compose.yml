version: "3.9"

# One-command local Snap2Stay stack.
#   docker compose up --build
# After it finishes ingesting, hit http://localhost:8081/v1/visual-search

services:

  embedding:
    build:
      context: ./embedding-service
    container_name: snap2stay-embedding
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  content-server:
    build:
      context: .
      dockerfile: content-server/Dockerfile
    container_name: snap2stay-content
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  visual-search-api:
    build:
      context: .
      dockerfile: visual-search-api/Dockerfile
    container_name: snap2stay-search
    ports:
      - "8081:8081"
    environment:
      SNAP2STAY_EMBEDDING_BASEURL: http://embedding:8082
    depends_on:
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/v1/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  ingestion:
    build:
      context: .
      dockerfile: image-ingestion-service/Dockerfile
    container_name: snap2stay-ingestion
    environment:
      SNAP2STAY_INGESTION_CONTENTSOURCE_BASEURL: http://content-server:8083
      SNAP2STAY_INGESTION_EMBEDDING_BASEURL: http://embedding:8082
      SNAP2STAY_INGESTION_VECTORSTORE_BASEURL: http://visual-search-api:8081
    depends_on:
      content-server:
        condition: service_healthy
      embedding:
        condition: service_healthy
      visual-search-api:
        condition: service_healthy
    restart: "no"
